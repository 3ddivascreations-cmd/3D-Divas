<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Divas Shop</title>

<style>
:root{
  --purple:#7c3aed;
  --panel-bg:rgba(255,255,255,.92);
  --panel-border:rgba(0,0,0,.08);
  --radius:16px;
  --shadow:0 10px 25px rgba(0,0,0,.12);
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f5f7;
}

/* HERO */
.hero{
  padding:60px 20px;
  text-align:center;
}

.hero .panel{
  background:var(--panel-bg);
  border:1px solid var(--panel-border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:30px;
  margin:auto;
  max-width:100%;
}

/* Desktop width */
@media(min-width:981px){
  .hero .panel{
    max-width:520px;
  }
}

h1{
  margin-top:0;
  color:var(--purple);
}

/* GRID */
.shop{
  padding:40px 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  max-width:1200px;
  margin:auto;
}

/* CARD */
.card{
  background:white;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  transition:.2s ease;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  display:block;
}

.no-image{
  height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#eee;
  font-weight:bold;
  color:#666;
}

.card-body{
  padding:18px;
}

.card h3{
  margin:0 0 10px;
}

.card p{
  margin:0;
  font-size:14px;
  color:#555;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}

.modal.active{
  display:flex;
}
</style>
</head>

<body>

<section class="hero">
  <div class="panel">
    <h1>3D Divas Shop</h1>
    <p>Fun. Creative. Custom 3D Prints.</p>
  </div>
</section>

<section class="shop">
  <div class="grid" id="modelGrid"></div>
</section>

<!-- Modal -->
<div class="modal" id="imageModal" onclick="closeModal()">
  <img id="modalImage" src="" alt="">
</div>

<script>
const models = [
  { title:"Model 1", description:"Custom print design", image:"images/model1.jpg" },
  { title:"Model 2", description:"Creative sculpture", image:"images/model2.jpg" },
  { title:"Model 3", description:"Fun decor item", image:"images/model3.jpg" },
  { title:"Model 4", description:"Colorful creation", image:"images/model4.jpg" },
  { title:"Model 5", description:"Unique design", image:"images/model5.jpg" },
  { title:"Model 6", description:"Modern art print", image:"images/model6.jpg" },
  { title:"Model 7", description:"Custom display piece", image:"images/model7.jpg" },
  { title:"Model 8", description:"Limited edition print", image:"images/model8.jpg" }
];

const grid = document.getElementById("modelGrid");

function render(){
  grid.innerHTML = "";

  models.forEach(m => {
    const card = document.createElement("div");
    card.className = "card";

    const imageHTML = m.image
      ? `<img src="${m.image}" alt="${m.title}" loading="lazy">`
      : `<div class="no-image">Image Coming Soon</div>`;

    card.innerHTML = `
      ${imageHTML}
      <div class="card-body">
        <h3>${m.title}</h3>
        <p>${m.description}</p>
      </div>
    `;

    if(m.image){
      card.addEventListener("click", () => openModal(m.image));
    }

    grid.appendChild(card);
  });
}

function openModal(src){
  if(!src) return;
  const modal = document.getElementById("imageModal");
  const modalImg = document.getElementById("modalImage");
  modalImg.src = src;
  modal.classList.add("active");
}

function closeModal(){
  const modal = document.getElementById("imageModal");
  const modalImg = document.getElementById("modalImage");
  modal.classList.remove("active");
  modalImg.src = "";
}

render();
</script>

</body>
</html>
