<script>
// =========================
// CHANGE THIS EMAIL
// =========================
const SITE_EMAIL = "YOUR_EMAIL_HERE";

// =========================
// MODELS
// =========================
const models = [
  {
    name: "Flexi Dragon",
    category: "Fantasy",
    price: 12,
    featured: true,
    sizes: ["Small", "Medium", "Large"],
    colors: ["Purple", "Blue", "Pink", "Black", "White"],
    turnaround: "2–5 days",
    desc: "A fun articulated dragon that wiggles and poses great on a desk.",
    thumb: "images/thumbs/flexi-dragon.png",
    image: "images/flexi-dragon.png"
  },
  {
    name: "Cute Axolotl",
    category: "Animals",
    price: 10,
    featured: true,
    sizes: ["Small", "Medium"],
    colors: ["Pink", "Mint", "White", "Rainbow (ask)"],
    turnaround: "2–5 days",
    desc: "A sweet little axolotl — great gift or shelf buddy.",
    thumb: "images/thumbs/axolotl.png",
    image: "images/axolotl.png"
  },
  {
    name: "Fidget Spiral",
    category: "Fidgets",
    price: 6,
    featured: true,
    sizes: ["One size"],
    colors: ["Red", "Blue", "Green", "Purple", "Two-tone (ask)"],
    turnaround: "1–3 days",
    desc: "A satisfying fidget that spins and clicks gently.",
    thumb: "images/thumbs/fidget_spiral.png",
    image: "images/fidget_spiral.png"
  },
  {
    name: "Heart Keychain",
    category: "Keychains",
    price: 5,
    featured: false,
    sizes: ["Small"],
    colors: ["Pink", "Red", "White", "Black"],
    turnaround: "1–3 days",
    desc: "A simple heart keychain. Add initials by request.",
    thumb: "images/thumbs/keychain_heart.png",
    image: "images/keychain_heart.png"
  },
  {
    name: "Desk Name Plate",
    category: "Personalized",
    price: 15,
    featured: false,
    sizes: ["Short", "Standard", "Long"],
    colors: ["White", "Black", "Blue", "Two-tone (ask)"],
    turnaround: "3–7 days",
    desc: "A custom name plate for desks. Email the name + color choice.",
    thumb: "images/thumbs/nameplate.png",
    image: "images/nameplate.png"
  },
  {
    name: "Mini Planter",
    category: "Home & Decor",
    price: 9,
    featured: false,
    sizes: ["Small", "Medium"],
    colors: ["White", "Gray", "Blue", "Pink"],
    turnaround: "2–5 days",
    desc: "A tiny planter for succulents or desk decor.",
    thumb: "images/thumbs/mini_planter.png",
    image: "images/mini_planter.png"
  },
  {
    name: "Snowflake Ornament",
    category: "Seasonal",
    price: 7,
    featured: false,
    sizes: ["Small", "Medium"],
    colors: ["White", "Blue"],
    turnaround: "2–5 days",
    desc: "Seasonal ornament — lightweight and easy to hang.",
    thumb: "images/thumbs/ornament_snowflake.png",
    image: "images/ornament_snowflake.png"
  }
];

// =========================
// Helpers
// =========================
function toUSD(num){
  return new Intl.NumberFormat("en-US",{
    style:"currency",
    currency:"USD"
  }).format(num);
}

function buildMailto(model, size, color){
  const subject = `3D Divas - Print Request: ${model.name}`;
  const body = `
Hi Stewart,

I would like to request this 3D print:

Model: ${model.name}
Category: ${model.category}
Size: ${size}
Color: ${color}

Thanks!
  `;
  return `mailto:${SITE_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

// =========================
// Modal
// =========================
const modal = document.getElementById("imgModal");
const modalImg = document.getElementById("imgModalImg");
const modalTitle = document.getElementById("imgModalTitle");
const modalClose = document.getElementById("imgModalClose");

function openModal(src, title){
  if(!src) return;
  modalImg.src = src;
  modalTitle.textContent = title;
  modal.setAttribute("aria-hidden","false");
  document.body.style.overflow = "hidden";
}

function closeModal(){
  modal.setAttribute("aria-hidden","true");
  modalImg.src = "";
  document.body.style.overflow = "";
}

modalClose.addEventListener("click", closeModal);
modal.addEventListener("click", e=>{
  if(e.target === modal) closeModal();
});

// =========================
// Render
// =========================
const grid = document.getElementById("modelGrid");

function render(){
  grid.innerHTML = "";

  models.forEach((m, index)=>{
    const card = document.createElement("article");
    card.className = "card";

    card.innerHTML = `
      <div class="thumb" data-full="${m.image}" data-title="${m.name}" tabindex="0">
        <img src="${m.thumb || m.image}" alt="${m.name}" loading="lazy">
      </div>

      <div class="title-row">
        <div>
          <h3>${m.name}</h3>
          <div class="meta" style="margin-top:8px;">
            <span class="pill">${m.category}</span>
            ${m.featured ? `<span class="pill accent">Popular</span>` : ""}
            <span class="pill">Turnaround: ${m.turnaround}</span>
          </div>
        </div>
        <div class="price">From ${toUSD(m.price)}</div>
      </div>

      <p class="desc">${m.desc}</p>

      <div style="margin-top:auto;">
        <a class="btn" href="${buildMailto(m, m.sizes[0], m.colors[0])}">
          ✉️ Request This Print
        </a>
      </div>
    `;

    grid.appendChild(card);
  });
}

grid.addEventListener("click", e=>{
  const t = e.target.closest(".thumb");
  if(!t) return;
  openModal(t.dataset.full, t.dataset.title);
});

render();
</script>
