<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>3D Divas — 3D Printed Creations</title>

<style>
:root{
  --bg:#ddf8e8;
  --primary:#38369a;
  --accent:#e0777d;
  --blue:#7b8cde;
  --muted:#475569;
  --border:rgba(56,54,154,.18);
  --shadow:0 12px 34px rgba(0,0,0,.08);
  --radius:20px;
}

/* Base */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:#111827;
}
.container{
  width:min(1120px, calc(100% - 40px));
  margin:0 auto;
}

/* Header */
header{
  background:rgba(221,248,232,.85);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
}
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
  flex-wrap:wrap;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
  color:inherit;
}
.logo{
  width:40px;
  height:40px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--blue));
}
.nav-links{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.nav-links a{
  text-decoration:none;
  font-weight:600;
  color:var(--primary);
}

/* ============================= */
/* OPTION C BANNER SYSTEM       */
/* ============================= */

.banner-wrap{
  padding:20px 0 0;
}

.banner{
  border-radius:26px;
  overflow:hidden;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  background:white;
}

.banner picture,
.banner img{
  display:block;
  width:100%;
  height:auto;   /* Never crop */
}

/* ============================= */
/* Layout (builds differently)  */
/* ============================= */

.layout{
  padding:30px 0 60px;
}

/* Desktop layout */
.layout-grid{
  display:grid;
  grid-template-columns:1.3fr .7fr;
  gap:20px;
}

/* Tablet layout */
@media (max-width:980px){
  .layout-grid{
    grid-template-columns:1fr;
  }
}

/* Panels */
.panel{
  background:white;
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px;
  box-shadow:var(--shadow);
}

.headline{
  font-size:clamp(28px,3vw,42px);
  margin:10px 0;
}
.subhead{
  color:var(--muted);
  line-height:1.6;
}

.btn{
  display:inline-block;
  background:var(--primary);
  color:white;
  padding:12px 18px;
  border-radius:999px;
  text-decoration:none;
  font-weight:700;
  margin-top:15px;
}

/* Footer */
footer{
  padding:30px 0;
  border-top:1px solid var(--border);
  background:rgba(255,255,255,.7);
  margin-top:40px;
}
footer p{
  color:var(--muted);
  margin:0;
}
</style>
</head>

<body>

<header>
  <div class="container">
    <nav class="nav">
      <a class="brand" href="#">
        <div class="logo"></div>
        <div>
          <strong>3D Divas</strong><br>
          <small>3D Printed Creations</small>
        </div>
      </a>
      <div class="nav-links">
        <a href="#shop">Shop</a>
        <a href="#contact">Email</a>
      </div>
    </nav>
  </div>
</header>

<main>

<!-- ============================= -->
<!-- OPTION C BANNER (No Cropping) -->
<!-- ============================= -->

<section class="banner-wrap">
  <div class="container">
    <div class="banner">
      <picture>

        <!-- Mobile -->
        <source
          media="(max-width: 640px)"
          srcset="
            images/banner-mobile.png 1x,
            images/banner-mobile@2x.png 2x
          "
        >

        <!-- Tablet -->
        <source
          media="(max-width: 980px)"
          srcset="
            images/banner-tablet.png 1x,
            images/banner-tablet@2x.png 2x
          "
        >

        <!-- Desktop -->
        <img
          src="images/banner-desktop.png"
          srcset="
            images/banner-desktop.png 1x,
            images/banner-desktop@2x.png 2x
          "
          alt="3D Divas Banner"
          decoding="async"
        >

      </picture>
    </div>
  </div>
</section>

<!-- ============================= -->
<!-- Content Layout               -->
<!-- ============================= -->

<section class="layout">
  <div class="container">
    <div class="layout-grid">

      <div class="panel">
        <h1 class="headline">Cute, Fun, Custom 3D Prints</h1>
        <p class="subhead">
          Browse our creations and email to request a print.
          Safe. Simple. No comments. No accounts.
        </p>
        <a class="btn" href="#shop">Browse Models</a>
      </div>

      <div class="panel">
        <h3>How It Works</h3>
        <p class="subhead">
          1. Pick a model.<br>
          2. Choose color & size.<br>
          3. Click request and send email.
        </p>
      </div>

    </div>
  </div>
</section>

</main>

<footer>
  <div class="container">
    <p>© <span id="year"></span> 3D Divas — Email Requests Only</p>
  </div>
</footer>

<script>
document.getElementById("year").textContent =
  new Date().getFullYear();
</script>

</body>
</html>
