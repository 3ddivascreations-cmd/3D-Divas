<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Divas — Shop</title>

  <style>
    :root{
      --purple:#3a2a7a;
      --purple-2:#2f2168;
      --ink:#0f172a;
      --muted:#334155;

      --panel-bg: rgba(255,255,255,.86);
      --panel-border: rgba(53,51,120,.22);

      --radius: 18px;
      --shadow: 0 14px 40px rgba(15, 23, 42, .12);

      --content-max: 1200px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--ink);
      background: #eaf7ef;
    }

    /* Optional: if you also want a device-swapped background on shop page, add these images */
    body{
      background-image: url("images/shop_bg-desktop.png");
      background-size: cover;
      background-position: center top;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }
    @media (max-width: 980px){
      body{
        background-image: url("images/shop_bg-tablet.png");
        background-attachment: scroll;
      }
    }
    @media (max-width: 640px){
      body{
        background-image: url("images/shop_bg-mobile.png");
        background-attachment: scroll;
      }
    }

    .topbar, .bottombar{
      background: linear-gradient(180deg, var(--purple), var(--purple-2));
      color: #fff;
    }
    .topbar{
      border-bottom: 2px solid rgba(255,255,255,.15);
    }
    .bottombar{
      border-top: 2px solid rgba(255,255,255,.15);
      margin-top: 28px;
    }
    .wrap{
      width: min(var(--content-max), calc(100% - 32px));
      margin: 0 auto;
    }
    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 14px;
      padding: 14px 0;
      flex-wrap:wrap;
    }
    .brand{
      display:flex;
      flex-direction:column;
      gap:2px;
      text-decoration:none;
      color:#fff;
      min-width: 180px;
    }
    .brand strong{ font-size: 16px; line-height:1.1; }
    .brand small{ font-size: 12px; opacity:.9; line-height:1.1; }

    .links{
      display:flex;
      align-items:center;
      gap: 18px;
      flex-wrap:wrap;
    }
    .links a{
      color:#fff;
      text-decoration:none;
      font-weight: 800;
      font-size: 14px;
      opacity: .95;
    }
    .links a:hover{ text-decoration: underline; }

    /* Full-width banner (same as home) */
    .banner{
      width: 100%;
      display:block;
      border-bottom: 2px solid rgba(53,51,120,.35);
      background: rgba(0,0,0,.08);
    }
    .banner picture, .banner img{
      display:block;
      width:100%;
      height:auto;
    }

    main{ padding: 18px 0 14px; }

    .hint{
      font-size: 13px;
      color: rgba(30,41,59,.85);
      margin: 6px 0 10px;
    }

    .toolbar{
      display:grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 12px;
      align-items:center;
      padding: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.70);
      border: 1px solid rgba(53,51,120,.18);
      box-shadow: 0 10px 28px rgba(15,23,42,.10);
      backdrop-filter: blur(6px);
    }
    @media (max-width: 980px){
      .toolbar{
        grid-template-columns: 1fr 1fr;
        border-radius: 22px;
      }
    }
    @media (max-width: 640px){
      .toolbar{
        grid-template-columns: 1fr;
      }
    }

    .input, .select{
      width:100%;
      padding: 12px 14px;
      border-radius: 999px;
      border: 1px solid rgba(53,51,120,.18);
      background: rgba(255,255,255,.9);
      outline:none;
      font-size: 14px;
    }
    .input:focus, .select:focus{
      box-shadow: 0 0 0 4px rgba(123,140,222,.22);
    }

    .results{
      font-size: 13px;
      color: rgba(30,41,59,.75);
      white-space: nowrap;
      text-align:right;
      padding-right: 6px;
    }
    @media (max-width: 980px){
      .results{ text-align:left; }
    }

    .grid{
      margin-top: 16px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px){
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      backdrop-filter: blur(6px);
      min-height: 340px;
    }

    .thumb{
      border-radius: 14px;
      border: 1px dashed rgba(53,51,120,.25);
      overflow:hidden;
      height: 160px;
      background: linear-gradient(135deg, rgba(123,140,222,.16), rgba(255,255,255,.6));
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      position:relative;
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
    }
    .thumb::after{
      content:"Click to preview";
      position:absolute;
      left: 10px;
      bottom: 10px;
      font-size: 12px;
      font-weight: 800;
      color: rgba(255,255,255,.95);
      background: rgba(47,33,104,.72);
      padding: 6px 10px;
      border-radius: 999px;
      opacity: 0;
      transition: opacity .15s ease;
    }
    .thumb:hover::after{ opacity: 1; }

    .row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
    }
    .title{
      margin:0;
      font-size: 16px;
      font-weight: 950;
      color:#2b2a72;
    }
    .price{
      font-weight: 950;
      color:#2b2a72;
      white-space: nowrap;
      font-size: 14px;
    }

    .pills{
      display:flex;
      flex-wrap:wrap;
      gap: 8px;
    }
    .pill{
      font-size: 12px;
      font-weight: 900;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(53,51,120,.18);
      background: rgba(123,140,222,.14);
      color: rgba(47,33,104,.95);
    }
    .pill.pop{
      background: rgba(224,119,125,.16);
      border-color: rgba(224,119,125,.22);
      color: #7a1c22;
    }

    .desc{
      margin:0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .fieldRow{
      display:grid;
      grid-template-columns: 70px 1fr;
      align-items:center;
      gap: 10px;
    }
    .label{
      font-size: 12px;
      color: rgba(30,41,59,.75);
      font-weight: 800;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 999px;
      text-decoration:none;
      font-weight: 950;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,.35);
      user-select:none;
      cursor:pointer;
      background: linear-gradient(180deg, #2f2b84, #2a256e);
      color:#fff;
      box-shadow: 0 10px 24px rgba(15,23,42,.10);
      margin-top:auto;
    }
    .btn:hover{ filter: brightness(1.05); }

    .btnNote{
      font-size: 12px;
      color: rgba(30,41,59,.75);
      margin-top: 6px;
    }

    .foot{
      padding: 14px 0;
      text-align:center;
      font-weight: 800;
      font-size: 13px;
      opacity: .95;
    }

    /* === Modal popup for larger image === */
    .modal{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 9999;
    }
    .modal.open{ display:flex; }

    .modalCard{
      width: min(980px, 100%);
      background: rgba(255,255,255,.96);
      border-radius: 18px;
      box-shadow: 0 22px 70px rgba(0,0,0,.25);
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.4);
    }
    .modalTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
      padding: 12px 14px;
      background: linear-gradient(180deg, rgba(58,42,122,.92), rgba(47,33,104,.92));
      color:#fff;
    }
    .modalTitle{
      font-weight: 950;
      font-size: 14px;
      margin:0;
    }
    .closeBtn{
      border: none;
      background: rgba(255,255,255,.18);
      color:#fff;
      font-weight: 950;
      border-radius: 10px;
      padding: 8px 10px;
      cursor:pointer;
    }
    .closeBtn:hover{ filter: brightness(1.05); }

    .modalBody{
      padding: 14px;
      display:grid;
      gap: 12px;
    }
    .modalBody img{
      width:100%;
      height:auto;
      display:block;
      border-radius: 14px;
      border: 1px solid rgba(53,51,120,.18);
    }
    .modalCaption{
      font-size: 13px;
      color: rgba(30,41,59,.8);
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <!-- TOP PURPLE BAR -->
  <div class="topbar">
    <div class="wrap">
      <div class="nav">
        <a class="brand" href="index.html" aria-label="3D Divas Home">
          <strong>3D Divas</strong>
          <small>3D Printed Creations</small>
        </a>

        <div class="links" aria-label="Top navigation">
          <a href="shop.html">Shop</a>
          <a id="emailTop" href="#">Email</a>
          <a href="index.html#about">About Us</a>
        </div>
      </div>
    </div>
  </div>

  <!-- FULL-WIDTH BANNER -->
  <div class="banner" aria-label="Banner">
    <picture>
      <source media="(max-width: 640px)" srcset="images/banner-mobile.png 1x">
      <source media="(max-width: 980px)" srcset="images/banner-tablet.png 1x">
      <img src="images/banner-desktop.png" srcset="images/banner-desktop.png 1x" alt="3D Divas banner">
    </picture>
  </div>

  <main>
    <div class="wrap">
      <div class="hint">Click a thumbnail to preview full-size.</div>

      <div class="toolbar" aria-label="Search and filters">
        <input class="input" id="searchInput" type="search" placeholder="Search models (ex: dragon, keychain, planter…)" />

        <select class="select" id="categoryFilter" aria-label="Category">
          <option value="all">All categories</option>
        </select>

        <select class="select" id="sortSelect" aria-label="Sort">
          <option value="featured">Sort: Featured</option>
          <option value="priceLow">Price: Low to High</option>
          <option value="priceHigh">Price: High to Low</option>
          <option value="nameAZ">Name: A to Z</option>
        </select>

        <div class="results" id="resultsCount">0 models shown</div>
      </div>

      <section class="grid" id="grid" aria-label="Model cards"></section>
    </div>
  </main>

  <!-- BOTTOM PURPLE BAR -->
  <div class="bottombar">
    <div class="wrap">
      <div class="foot">© <span id="year"></span> 3D Divas — Email Requests Only</div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Image preview">
    <div class="modalCard">
      <div class="modalTop">
        <p class="modalTitle" id="modalTitle">Preview</p>
        <button class="closeBtn" id="closeBtn" type="button">Close</button>
      </div>
      <div class="modalBody">
        <img id="modalImg" alt="Preview image">
        <div class="modalCaption" id="modalCaption"></div>
      </div>
    </div>
  </div>

  <script>
    // ======= CONFIG =======
    const SITE_EMAIL = "YOUR_EMAIL_HERE"; // <-- change this
    function buildMailto(modelName, size, color){
      const subject = `3D Divas - Print Request: ${modelName}`;
      const body =
`Hi Stewart,

I would like to request this 3D print:

Model: ${modelName}
Size: ${size || "Not selected"}
Color: ${color || "Not selected"}
Quantity: 1

Notes / personalization (optional):
-

Thanks!`;
      return `mailto:${SITE_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }
    function generalMailto(){
      const subject = "3D Divas - Question";
      const body =
`Hi Stewart,

I have a question about 3D Divas.

My question:
-

Thanks!`;
      return `mailto:${SITE_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }
    document.getElementById("emailTop").href = generalMailto();

    // ======= MODELS (edit these) =======
    // imageThumb = what shows on the card
    // imageLarge = what shows in the popup
    const models = [
      {
        name: "Cute Axolotl",
        category: "Animals",
        price: 10,
        featured: true,
        turnaround: "2–5 days",
        desc: "A sweet little axolotl — great gift or shelf buddy.",
        sizes: ["Small", "Medium"],
        colors: ["Pink", "Mint", "White"],
        imageThumb: "images/thumbs/axolotl_1.png",
        imageLarge: "images/models/axolotl_1.png"
      },
      {
        name: "Flexi Dragon",
        category: "Fantasy",
        price: 12,
        featured: true,
        turnaround: "2–5 days",
        desc: "Articulated dragon that wiggles and poses great on a desk.",
        sizes: ["Small", "Medium", "Large"],
        colors: ["Purple", "Blue", "Black"],
        imageThumb: "images/thumbs/flexi-dragon_1.png",
        imageLarge: "images/models/flexi-dragon_1.png"
      }
      // Add more…
    ];

    // ======= UI =======
    const grid = document.getElementById("grid");
    const resultsCount = document.getElementById("resultsCount");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const sortSelect = document.getElementById("sortSelect");

    // Modal
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");
    const modalTitle = document.getElementById("modalTitle");
    const modalCaption = document.getElementById("modalCaption");
    const closeBtn = document.getElementById("closeBtn");

    function openModal(title, imgSrc, caption){
      modalTitle.textContent = title;
      modalImg.src = imgSrc;
      modalImg.alt = title;
      modalCaption.textContent = caption || "";
      modal.classList.add("open");
    }
    function closeModal(){
      modal.classList.remove("open");
      modalImg.src = "";
    }
    closeBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", (e)=>{
      if(e.target === modal) closeModal();
    });
    document.addEventListener("keydown", (e)=>{
      if(e.key === "Escape") closeModal();
    });

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function usd(n){
      try { return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(n); }
      catch { return "$" + Number(n).toFixed(2); }
    }

    // Build category options
    const cats = Array.from(new Set(models.map(m => m.category))).sort((a,b)=>a.localeCompare(b));
    for(const c of cats){
      const opt = document.createElement("option");
      opt.value = c;
      opt.textContent = c;
      categoryFilter.appendChild(opt);
    }

    function matches(m, q, cat){
      const hay = [m.name, m.category, m.desc, m.turnaround, ...(m.sizes||[]), ...(m.colors||[])].join(" ").toLowerCase();
      const qOk = !q || hay.includes(q);
      const cOk = cat === "all" || m.category === cat;
      return qOk && cOk;
    }

    function sortList(list, mode){
      const a = [...list];
      if(mode === "priceLow") a.sort((x,y)=>x.price - y.price);
      else if(mode === "priceHigh") a.sort((x,y)=>y.price - x.price);
      else if(mode === "nameAZ") a.sort((x,y)=>x.name.localeCompare(y.name));
      else{
        a.sort((x,y)=>{
          const xf = x.featured ? 1 : 0;
          const yf = y.featured ? 1 : 0;
          if(yf !== xf) return yf - xf;
          return x.name.localeCompare(y.name);
        });
      }
      return a;
    }

    function render(){
      const q = (searchInput.value || "").trim().toLowerCase();
      const cat = categoryFilter.value;
      const mode = sortSelect.value;

      const filtered = models.filter(m => matches(m, q, cat));
      const sorted = sortList(filtered, mode);

      resultsCount.textContent = `${sorted.length} model${sorted.length===1?"":"s"} shown`;

      if(sorted.length === 0){
        grid.innerHTML = `<div class="card" style="grid-column:1/-1;">
          <h3 class="title">No matches</h3>
          <p class="desc">Try a different search or choose “All categories”.</p>
        </div>`;
        return;
      }

      grid.innerHTML = sorted.map((m, i) => {
        const sizeId = `size_${i}`;
        const colorId = `color_${i}`;
        const btnId = `btn_${i}`;

        const sizeOpts = (m.sizes || ["One size"]).map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("");
        const colorOpts = (m.colors || ["Ask"]).map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");

        return `
          <article class="card">
            <div class="thumb" data-large="${escapeHtml(m.imageLarge || m.imageThumb)}" data-title="${escapeHtml(m.name)}" data-caption="${escapeHtml(m.desc)}">
              ${m.imageThumb ? `<img src="${escapeHtml(m.imageThumb)}" alt="${escapeHtml(m.name)} thumbnail" loading="lazy">` : `<span>3D Divas</span>`}
            </div>

            <div class="row">
              <h3 class="title">${escapeHtml(m.name)}</h3>
              <div class="price">From ${escapeHtml(usd(m.price))}</div>
            </div>

            <div class="pills">
              <span class="pill">${escapeHtml(m.category)}</span>
              ${m.featured ? `<span class="pill pop">Popular</span>` : ``}
              <span class="pill">Turnaround: ${escapeHtml(m.turnaround || "Ask")}</span>
            </div>

            <p class="desc">${escapeHtml(m.desc || "")}</p>

            <div class="fieldRow">
              <div class="label">Size</div>
              <select class="select" id="${sizeId}">${sizeOpts}</select>
            </div>

            <div class="fieldRow">
              <div class="label">Color</div>
              <select class="select" id="${colorId}">${colorOpts}</select>
            </div>

            <a class="btn" id="${btnId}" href="#">Request This Print</a>
            <div class="btnNote">Email opens with the details filled in.</div>
          </article>
        `;
      }).join("");

      // Hook up modal + mailto buttons
      const thumbs = grid.querySelectorAll(".thumb");
      thumbs.forEach(t => {
        t.addEventListener("click", ()=>{
          openModal(t.dataset.title, t.dataset.large, t.dataset.caption);
        });
      });

      sorted.forEach((m, i)=>{
        const sizeEl = document.getElementById(`size_${i}`);
        const colorEl = document.getElementById(`color_${i}`);
        const btnEl = document.getElementById(`btn_${i}`);

        function update(){
          btnEl.href = buildMailto(m.name, sizeEl.value, colorEl.value);
        }
        sizeEl.addEventListener("change", update);
        colorEl.addEventListener("change", update);
        update();
      });
    }

    searchInput.addEventListener("input", render);
    categoryFilter.addEventListener("change", render);
    sortSelect.addEventListener("change", render);

    document.getElementById("year").textContent = new Date().getFullYear();
    render();
  </script>
</body>
</html>
