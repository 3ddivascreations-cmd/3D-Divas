<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>3D Divas — Shop</title>

<style>
:root{
  --honeydew:#ddf8e8;
  --egyptian-blue:#38369a;
  --light-coral:#e0777d;
  --wisteria-blue:#7b8cde;
  --wisteria-blue-2:#81a4cd;

  --bg: var(--honeydew);
  --text: #111827;
  --muted: #475569;
  --border: rgba(56,54,154,.18);

  --primary: var(--egyptian-blue);
  --shadow: 0 12px 34px rgba(0,0,0,.08);
  --radius: 18px;
  --focus: 0 0 0 4px rgba(123,140,222,.25);
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 18% 0%, rgba(123,140,222,.22), transparent 35%),
    radial-gradient(circle at 92% 10%, rgba(224,119,125,.20), transparent 35%),
    radial-gradient(circle at 70% 90%, rgba(129,164,205,.18), transparent 40%),
    var(--bg);
}

.container{
  width:min(1200px, calc(100% - 40px));
  margin:0 auto;
}

/* =========================
   TOP PURPLE BANNER
========================= */
.banner-wrap{
  width:100%;
  background: linear-gradient(135deg, var(--egyptian-blue), var(--wisteria-blue));
  border-bottom: 4px solid rgba(0,0,0,.1);
  position:sticky;
  top:0;
  z-index:50;
}

.banner-inner{
  position:relative;
  max-width:1200px;
  margin:0 auto;
  padding: 28px 20px 34px;
  text-align:center;
  color:white;
}

.banner-title{
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 900;
  letter-spacing: -1px;
  margin:0;
}

.banner-sub{
  margin-top:8px;
  font-size: 16px;
  opacity:.9;
}

.banner-home{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  background: rgba(255,255,255,.15);
  padding:10px 16px;
  border-radius:999px;
  text-decoration:none;
  color:white;
  font-weight:700;
  backdrop-filter: blur(6px);
  transition:.2s;
}
.banner-home:hover{
  background: rgba(255,255,255,.25);
}

/* =========================
   FILTER RIBBON
========================= */
.ribbon{
  padding:18px 0 20px;
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  background: rgba(255,255,255,.9);
  border:1px solid var(--border);
  border-radius:999px;
  padding:12px;
  box-shadow: var(--shadow);
}

.input, .select{
  border:1px solid var(--border);
  background:white;
  border-radius:999px;
  padding:12px 16px;
  font-size:14px;
  outline:none;
}

.input{ flex:1 1 320px; }

.input:focus, .select:focus{
  box-shadow: var(--focus);
}

.results{
  margin-left:auto;
  font-size:13px;
  color:var(--muted);
}

/* =========================
   SHOP LAYOUT
========================= */
.shop-layout{
  display:grid;
  grid-template-columns: 1fr 360px;
  gap:18px;
  padding-bottom:50px;
}

@media (max-width:980px){
  .shop-layout{ grid-template-columns:1fr; }
}

/* =========================
   RIGHT PANEL
========================= */
.right-panel{
  position:sticky;
  top:260px;
  border-radius:22px;
  overflow:hidden;
  border:1px solid var(--border);
  background:rgba(255,255,255,.9);
  box-shadow:var(--shadow);
  min-height:520px;
}

@media (max-width:980px){
  .right-panel{ position:relative; top:0; min-height:260px; }
}

.right-panel img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* =========================
   PRODUCT CARDS
========================= */
.grid{
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:16px;
}

@media (max-width:640px){
  .grid{ grid-template-columns:1fr; }
}

.card{
  background:white;
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.thumb{
  height:180px;
  border-radius:14px;
  border:1px dashed rgba(56,54,154,.25);
  overflow:hidden;
  cursor:pointer;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.title-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

h3{
  margin:0;
  font-size:17px;
  font-weight:800;
}

.price{
  font-weight:900;
  color:var(--primary);
}

.desc{
  font-size:14px;
  color:var(--muted);
  margin:0;
}

.meta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.pill{
  padding:6px 12px;
  border-radius:999px;
  background:rgba(123,140,222,.14);
  border:1px solid rgba(123,140,222,.25);
  font-size:12px;
  font-weight:700;
}

.pill.accent{
  background:rgba(224,119,125,.14);
  border-color:rgba(224,119,125,.3);
}

/* MATCHED TEXTBOX STYLE */
.meta select{
  flex:1;
  border-radius:999px;
  padding:10px 14px;
  border:1px solid var(--border);
  background:white;
}

.btn{
  background:var(--primary);
  color:white;
  border:none;
  border-radius:999px;
  padding:12px;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
  text-align:center;
  margin-top:auto;
  box-shadow:var(--shadow);
}

.btn:hover{ filter:brightness(1.05); }

/* =========================
   MODAL
========================= */
.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.7);
  z-index:1000;
}

.modal.show{ display:flex; }

.modal img{
  max-width:90%;
  max-height:85vh;
  border-radius:18px;
}
</style>
</head>

<body>

<div class="banner-wrap">
  <div class="banner-inner">
    <a href="index.html" class="banner-home">Home</a>
    <h1 class="banner-title">3D Divas Shop</h1>
    <div class="banner-sub">Fun. Custom. Made Just for You.</div>
  </div>
</div>

<section class="ribbon">
  <div class="container">
    <div class="controls">
      <input class="input" type="search" placeholder="Search models..." />
      <select class="select">
        <option>All categories</option>
      </select>
      <select class="select">
        <option>Sort: Featured</option>
      </select>
      <div class="results">7 models shown</div>
    </div>
  </div>
</section>

<main class="container">
  <div class="shop-layout">

    <section>
      <div class="grid">
        <!-- Your product cards remain here -->
      </div>
    </section>

    <aside class="right-panel">
      <img src="images/shop-side.png" alt="3D Divas character art">
    </aside>

  </div>
</main>

<div class="modal" id="modal">
  <img src="" alt="">
</div>

</body>
</html>
